<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秘密基地</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== 开屏动画 ===== -->
<div id="intro" aria-hidden="true">
  <div class="intro-bg-pulse"></div>
  <div class="intro-content">
    <div class="intro-chars">
      <span class="ic" style="--delay:0s">秘</span>
      <span class="ic" style="--delay:0.22s">密</span>
      <span class="ic" style="--delay:0.44s">基</span>
      <span class="ic" style="--delay:0.66s">地</span>
    </div>
    <div class="intro-line"></div>
    <div class="intro-sub">黄历 · 圣杯 · 密室</div>
  </div>
</div>

<!-- ===== 彩蛋层 ===== -->
<div id="easterEgg" aria-hidden="true">
  <div class="egg-inner">
    <div class="egg-text">lrbnb</div>
    <div class="egg-sub">🎉 你发现了隐藏彩蛋！</div>
  </div>
</div>

<!-- ===== 画布层 ===== -->
<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<!-- ===== 音乐开关 ===== -->
<button id="musicToggle" class="music-toggle" title="古筝背景音乐">
  <svg class="music-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M9 18V5l12-2v13"/>
    <circle cx="6" cy="18" r="3"/>
    <circle cx="18" cy="16" r="3"/>
  </svg>
  <span class="music-slash" id="musicSlash"></span>
  <span class="music-label" id="musicLabel">乐</span>
</button>

<!-- ===== 主容器 ===== -->
<div class="container">

  <!-- 印章 -->
  <div class="seal">
    <div class="seal-text">秘<br>密<br>地</div>
  </div>

  <!-- ===== Tab 横栏 ===== -->
  <nav class="tab-bar">
    <div class="tab-indicator" id="tabIndicator"></div>
    <button class="tab-btn active" data-tab="huangli">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <rect x="2" y="3" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 1v4M13 1v4M2 8h16" stroke="currentColor" stroke-width="1.5"/>
        <rect x="5" y="11" width="3" height="3" rx="0.5"/>
        <rect x="12" y="11" width="3" height="3" rx="0.5"/>
      </svg>
      <span>黄 历</span>
    </button>
    <button class="tab-btn" data-tab="shengbei">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <path d="M10 2 C10 2 4 6 4 11 A6 6 0 0 0 16 11 C16 6 10 2 10 2 Z"/>
        <path d="M8 11 C8 13 9 15 10 16 C11 15 12 13 12 11"/>
        <path d="M10 16 L10 19"/>
        <path d="M7 19 L13 19"/>
      </svg>
      <span>圣 杯</span>
    </button>
    <button class="tab-btn" data-tab="mishi">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <rect x="2" y="2" width="16" height="16" rx="1.5"/>
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M10 2 L10 5M10 15 L10 18M2 10 L5 10M15 10 L18 10"/>
        <path d="M4.5 4.5 L6.5 6.5M13.5 13.5 L15.5 15.5M15.5 4.5 L13.5 6.5M6.5 13.5 L4.5 15.5"/>
      </svg>
      <span>密 室</span>
    </button>
  </nav>

  <!-- ===== 黄历面板 ===== -->
  <div id="panel-huangli" class="panel active">

    <header class="header">
      <div class="year-label"  id="yearLabel"></div>
      <div class="day-number"  id="dayNumber"></div>
      <div class="lunar-date"  id="lunarDate"></div>
      <div class="ganzhi-row"  id="ganzhiRow"></div>
      <div class="jieqi-badge" id="jieqiBadge"></div>
    </header>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-center">今 日 宜 忌</div>
      <div class="divider-line"></div>
    </div>

    <div class="yiji-grid">
      <div class="yiji-card yi-card">
        <div class="card-title yi-title">宜</div>
        <div class="tag-list" id="yiList"></div>
      </div>
      <div class="yiji-card ji-card">
        <div class="card-title ji-title">忌</div>
        <div class="tag-list" id="jiList"></div>
      </div>
    </div>

    <div class="info-bar">
      <div class="info-item">
        <div class="info-label">纳音五行</div>
        <div class="info-value" id="wuxing"></div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="info-label">冲 煞</div>
        <div class="info-value" id="chong"></div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="info-label">值 神</div>
        <div class="info-value" id="zhishen"></div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="info-label">今日运势</div>
        <div class="info-value" id="luck"></div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="info-label">节 气</div>
        <div class="info-value" id="jieqiInfo"></div>
      </div>
    </div>

    <div class="divider extra-divider">
      <div class="divider-line"></div>
      <div class="divider-center">更 多 详 情</div>
      <div class="divider-line"></div>
    </div>

    <div class="extra-grid">
      <div class="extra-card moon-card">
        <div class="extra-card-label">月 相</div>
        <div class="moon-visual">
          <div class="moon-body">
            <div class="moon-shadow" id="moonShadow"></div>
          </div>
        </div>
        <div class="moon-name" id="moonName"></div>
        <div class="moon-age"  id="moonAge"></div>
      </div>
      <div class="extra-card pengzu-card">
        <div class="extra-card-label">彭祖百忌</div>
        <div class="pengzu-line" id="pengzuStem"></div>
        <div class="pengzu-line" id="pengzuBranch"></div>
      </div>
    </div>

    <div class="shichen-section">
      <div class="shichen-label">十二时辰吉凶</div>
      <div class="shichen-grid" id="shichenGrid"></div>
    </div>

    <div class="clock">
      <div class="clock-time"    id="clockTime"></div>
      <div class="clock-shichen" id="clockShichen"></div>
    </div>

  </div><!-- /panel-huangli -->

  <!-- ===== 圣杯面板 ===== -->
  <div id="panel-shengbei" class="panel">

    <div class="bei-header">
      <div class="bei-title">圣 杯 问 卜</div>
      <div class="bei-hint">心中默念所求之事，诚心掷杯以问神明</div>
    </div>

    <!-- 两个杯筊 -->
    <div class="bei-stage">
      <div class="bei-scene" id="beiScene1">
        <div class="bei-flipper">
          <div class="bei-card" id="beiCard1">
            <div class="bei-face yang-face">
              <div class="bei-highlight"></div>
              <div class="bei-grain"></div>
            </div>
            <div class="bei-face yin-face">
              <div class="bei-texture"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="bei-vs">✦</div>
      <div class="bei-scene" id="beiScene2">
        <div class="bei-flipper">
          <div class="bei-card" id="beiCard2">
            <div class="bei-face yang-face">
              <div class="bei-highlight"></div>
              <div class="bei-grain"></div>
            </div>
            <div class="bei-face yin-face">
              <div class="bei-texture"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 掷杯按钮 -->
    <div class="throw-wrap">
      <button class="throw-btn" id="throwBtn">
        <span class="throw-text">掷  杯</span>
        <div class="throw-ripple"></div>
      </button>
    </div>

    <!-- 结果区 -->
    <div class="bei-result" id="beiResult">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-msg"  id="resultMsg"></div>
    </div>

    <!-- 历次记录 -->
    <div class="bei-history">
      <div class="history-label">历次记录</div>
      <div class="history-dots" id="historyDots"></div>
    </div>

  </div><!-- /panel-shengbei -->

  <!-- ===== 密室面板 ===== -->
  <div id="panel-mishi" class="panel">

    <div class="mishi-header">
      <div class="mishi-title">密 室 攻 略</div>
      <div class="mishi-sub">艾伦格 · 15 处秘密地下室 · Patch 31.2</div>
    </div>

    <!-- 迷你地图 -->
    <div class="mishi-map-wrap">
      <canvas id="mishiCanvas" width="320" height="320"></canvas>
      <div class="mishi-map-legend">
        <span class="legend-dot high"></span>高危
        <span class="legend-dot mid"></span>中危
        <span class="legend-dot low"></span>低危
      </div>
    </div>

    <!-- 过滤栏 -->
    <div class="mishi-filter" id="mishiFilter">
      <button class="mf-btn active" data-risk="all">全 部</button>
      <button class="mf-btn" data-risk="高">高 危</button>
      <button class="mf-btn" data-risk="中">中 危</button>
      <button class="mf-btn" data-risk="低">低 危</button>
    </div>

    <!-- 卡片列表 -->
    <div class="mishi-grid" id="mishiGrid"></div>

    <!-- 选中详情弹出 -->
    <div class="mishi-detail" id="mishiDetail">
      <div class="md-close" id="mishiDetailClose">✕</div>
      <div class="md-num" id="mdNum"></div>
      <div class="md-name" id="mdName"></div>
      <div class="md-grid" id="mdGrid"></div>
      <div class="md-rows">
        <div class="md-row"><span class="md-label">风险</span><span class="md-val" id="mdRisk"></span></div>
        <div class="md-row"><span class="md-label">进入</span><span class="md-val" id="mdEntry"></span></div>
        <div class="md-row"><span class="md-label">战利品</span><span class="md-val" id="mdLoot"></span></div>
        <div class="md-row"><span class="md-label">提示</span><span class="md-val" id="mdTip"></span></div>
      </div>
    </div>

  </div><!-- /panel-mishi -->

</div><!-- /container -->

<script src="main.js"></script>
</body>
</html>
